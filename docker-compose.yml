version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - JOB_STORAGE_PATH=/tmp/piano-sheet-jobs
    volumes:
      - job-data:/tmp/piano-sheet-jobs
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G
        reservations:
          cpus: '1'
          memory: 2G
    networks:
      - piano-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
    networks:
      - piano-network
    depends_on:
      - backend

volumes:
  job-data:
    driver: local

networks:
  piano-network:
    driver: bridge
